<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Accès sécurisé — YATOO Étude</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231E2761'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='14' fill='white'>Y</text></svg>">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">
      <div class="login-card__logo-mark"><span>Y</span></div>
      <h1>YATOO</h1>
      <p class="login-card__sub">Étude commerciale — accès interne</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          autofocus
          required
        >
      </div>
      <div class="login-error" id="login-error">Mot de passe incorrect.</div>
      <button type="submit" class="btn btn--primary btn--full">Accéder à l'étude</button>
    </form>

    <p class="login-note">Protection légère côté navigateur — ne pas partager ce lien publiquement.</p>
  </div>
</div>

<script>
async function handleLogin(event) {
  event.preventDefault();
  var input = document.getElementById('password');
  var error = document.getElementById('login-error');
  var pw = input.value;
  var hash = await sha256(pw);
  var stored = 'b37ec53b51e84407fdfb31f859b3d1fcae149bea5190f64fccb66d9b81b0210d';
  if (hash === stored) {
    sessionStorage.setItem('yatoo_auth', '1');
    var params = new URLSearchParams(window.location.search);
    var redirect = params.get('r') || '/index.html';
    window.location.href = redirect;
  } else {
    error.classList.add('visible');
    input.value = '';
    input.focus();
    setTimeout(function () { error.classList.remove('visible'); }, 3000);
  }
}
async function sha256(msg) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
</script>
</body>
</html>
