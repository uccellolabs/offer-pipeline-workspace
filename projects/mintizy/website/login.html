<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Accès protégé : étude Mintizy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      background: var(--color-bg-dark);
      background-image:
        radial-gradient(ellipse 80% 50% at 70% 30%, rgba(47,178,147,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,240,224,0.10) 0%, transparent 60%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-6);
    }
    .login-card {
      max-width: 440px;
      width: 100%;
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-lg);
    }
    .login-card__mark {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: var(--gradient-primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-5);
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
    }
    .login-card p.lead {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }
    .login-card .form button {
      margin-top: var(--space-2);
      width: 100%;
      justify-content: center;
    }
    .login-error {
      display: none;
      padding: var(--space-3) var(--space-4);
      background: var(--color-danger-light);
      color: var(--color-danger);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 500;
    }
    .login-error.visible { display: block; }
    .login-footer {
      margin-top: var(--space-6);
      padding-top: var(--space-5);
      border-top: 1px solid var(--color-border);
      font-size: 0.75rem;
      color: var(--color-text-faint);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-card__mark">M</div>
    <h1>Étude Mintizy</h1>
    <p class="lead">Document interne. Saisissez le mot de passe pour accéder au référentiel commercial.</p>

    <form id="login-form" class="form">
      <div>
        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" required autocomplete="off" autofocus>
      </div>
      <div class="login-error" id="login-error" role="alert">Mot de passe incorrect.</div>
      <button type="submit" class="btn btn--primary">Accéder à l'étude</button>
    </form>

    <div class="login-footer">
      Référentiel généré 2026-05-05 · UCCELLO LABS · Montpellier
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var HASH = 'e7454682c205465c9eb1998d5baa1467b728551134efb1c135d866834e17a6af';

      // Si déjà authentifié dans cette session, redirect immédiat vers l'accueil
      if (sessionStorage.getItem('mintizy_auth') === 'ok') {
        window.location.replace('index.html');
        return;
      }

      async function sha256Hex(str) {
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(function (b) {
          return b.toString(16).padStart(2, '0');
        }).join('');
      }

      var form = document.getElementById('login-form');
      var input = document.getElementById('password');
      var errorEl = document.getElementById('login-error');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.classList.remove('visible');
        var pwd = input.value;
        try {
          var hash = await sha256Hex(pwd);
          if (hash === HASH) {
            sessionStorage.setItem('mintizy_auth', 'ok');
            window.location.replace('index.html');
          } else {
            errorEl.classList.add('visible');
            input.value = '';
            input.focus();
          }
        } catch (err) {
          errorEl.textContent = 'Erreur cryptographique : ' + err.message;
          errorEl.classList.add('visible');
        }
      });
    })();
  </script>

</body>
</html>
